name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Test
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install shellcheck + bats + kcov
        run: sudo apt-get update && sudo apt-get install -y shellcheck bats kcov

      - name: Syntax check (bash -n)
        run: |
          shopt -s nullglob
          for f in full-upgrade.sh lib/*.sh lib/steps/*.sh steps.d/*.sh install.sh build.sh; do
            echo "bash -n $f"
            bash -n "$f"
          done

      - name: ShellCheck
        run: |
          shellcheck -S warning -x \
            full-upgrade.sh lib/*.sh lib/steps/*.sh steps.d/*.sh install.sh build.sh

      - name: Smoke test
        run: |
          bash full-upgrade.sh --help
          bash full-upgrade.sh --list-steps
          XDG_CONFIG_HOME="$RUNNER_TEMP/nocfg" bash full-upgrade.sh --dry-run --mode full

      - name: Unit tests (bats)
        run: bats tests/

      - name: Coverage (kcov + bats)
        run: scripts/coverage-bats.sh

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: coverage/bats/cobertura.xml
          flags: bats
          name: full-upgrade-bats
          disable_search: true
          fail_ci_if_error: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
          use_oidc: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}

      - name: Build standalone
        run: ./build.sh

      - name: Verify standalone builds and runs
        run: |
          bash -n dist/full-upgrade-standalone.sh
          ./dist/full-upgrade-standalone.sh --list-steps >/dev/null
          XDG_CONFIG_HOME="$RUNNER_TEMP/nocfg2" ./dist/full-upgrade-standalone.sh --dry-run --mode full >/dev/null

      - name: Upload standalone artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: full-upgrade-standalone
          path: dist/full-upgrade-standalone.sh
          if-no-files-found: error
          retention-days: 14
