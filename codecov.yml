coverage:
  status:
    project:
      default:
        target: auto
        threshold: 2%
        if_ci_failed: error
    patch:
      default:
        target: 0%
        if_ci_failed: error

flags:
  bats:
    paths:
      - full-upgrade.sh
      - build.sh
      - install.sh
      - lib/
      - steps.d/

comment:
  layout: "reach,diff,flags,tree"
  behavior: default
  require_changes: false
