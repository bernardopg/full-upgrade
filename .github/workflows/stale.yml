name: Stale

# Marca e fecha issues/PRs inativos. Mantém o tracker limpo.
# Semanal basta: com days-before-stale=60, granularidade diária não muda nada.

on:
  schedule:
    - cron: "30 2 * * 1"   # segunda 02:30 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  stale:
    name: Marcar inativos
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/stale@1e223db275d687790206a7acac4d1a11bd6fe629 # v10.4.0
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          operations-per-run: 30
          days-before-stale: 60
          days-before-close: 14
          stale-issue-label: stale
          stale-pr-label: stale
          exempt-issue-labels: pinned,security,enhancement,help wanted,good first issue
          exempt-pr-labels: pinned,security,dependencies
          stale-issue-message: >
            Esta issue está inativa há 60 dias e foi marcada como stale.
            Será fechada em 14 dias sem atividade. Comente para reabrir ou
            adicione a label `pinned` para manter aberta.
          stale-pr-message: >
            Este PR está inativo há 60 dias e foi marcado como stale.
            Será fechado em 14 dias sem atividade. Retome o trabalho ou
            adicione a label `pinned` para manter aberto.
          close-issue-message: >
            Fechada automaticamente por inatividade. Reabra se ainda for relevante.
          close-pr-message: >
            Fechado automaticamente por inatividade. Reabra se for retomar.
