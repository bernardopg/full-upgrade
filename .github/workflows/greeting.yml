name: Greeting

# Boas-vindas a contribuidores novos (primeira issue ou PR no repo).

on:
  issues:
    types: [opened]
  pull_request:
    types: [opened]

permissions:
  issues: write
  pull-requests: write

jobs:
  greet:
    name: Saudar contribuidor
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/first-interaction@1c4688942c71f71d4f5502a26ea67c331730fa4d # v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          issue-message: >
            Obrigado por abrir esta issue! Leia o CONTRIBUTING.md para o
            padrão de commits e como rodar a validação local (bash -n,
            shellcheck e bats). A equipe responde em breve.
          pr-message: >
            Obrigado pelo PR! O CI roda syntax check, shellcheck, shfmt
            (consultivo), bats, coverage e build standalone. Garanta que
            `bats tests/` passe localmente. Commits devem seguir
            Conventional Commits (feat:, fix:, docs:, ci:, ...).
