<?xml version="1.0" encoding="UTF-8"?>
<!-- full-upgrade — ícone base do aplicativo (hicolor/scalable/apps).
     Tile arredondado com seta de upgrade + arco de refresh. Arch blue. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="fu-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1d8fd4"/>
      <stop offset="1" stop-color="#0f5e9e"/>
    </linearGradient>
    <linearGradient id="fu-ar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#d8ecf8"/>
    </linearGradient>
  </defs>
  <rect x="32" y="32" width="448" height="448" rx="104" ry="104" fill="url(#fu-bg)"/>
  <!-- arco de refresh -->
  <path d="M392 196a144 144 0 1 0 24 76" fill="none" stroke="#bfe2f5" stroke-width="30" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- seta de upgrade -->
