name: Semgrep

# SAST para Bash — preenche a lacuna do CodeQL, que NÃO suporta Bash.
# Achados aparecem em Security > Code scanning alerts. Hoje consultivo
# (continue-on-error): triagem primeiro, promover a bloqueante depois.
# Path-filtered: só roda quando código Bash (ou o próprio setup do Semgrep)
# muda; a varredura semanal cobre regressões de regras novas.

on:
  push:
    branches: [main]
    paths:
      - "**.sh"
      - "**.bash"
      - ".github/workflows/semgrep.yml"
      - ".github/requirements-semgrep.txt"
  pull_request:
    paths:
      - "**.sh"
      - "**.bash"
      - ".github/workflows/semgrep.yml"
      - ".github/requirements-semgrep.txt"
  schedule:
    - cron: "17 3 * * 1"   # segunda 03:17 UTC
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: semgrep-${{ github.ref }}
  cancel-in-progress: true

jobs:
  semgrep:
    name: Semgrep SAST (Bash)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write   # upload SARIF p/ code scanning
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Consultivo: não quebra o CI em achados; eles viram alerts no GitHub
      # (Security > Code scanning). Rodamos a CLI direto (não a action Docker)
      # para garantir a geração do SARIF em semgrep.sarif.
      # Remova `continue-on-error` (+ adicione --error) após triar os findings.
      #
      # Instalação com --require-hashes (lockfile gerado por
      # `pip-compile --generate-hashes`): bump de versão exige regenerar
      # .github/requirements-semgrep.txt, não só trocar o número.
      - name: Semgrep scan
        id: semgrep
        continue-on-error: true
        run: |
          python3 -m pip install --user --require-hashes -r .github/requirements-semgrep.txt
          semgrep scan --config p/default --sarif --output semgrep.sarif

      - name: Upload SARIF to GitHub code scanning
        if: always() && hashFiles('semgrep.sarif') != ''
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4
        with:
          sarif_file: semgrep.sarif
          category: semgrep
