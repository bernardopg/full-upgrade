name: Scorecard

# OpenSSF Scorecard: postura de segurança/cadeia de suprimentos do repo.
# Público + gratuito. Publica o score que alimenta o badge no README.

on:
  push:
    branches: [main]
  schedule:
    - cron: "33 5 * * 1"   # segunda 05:33 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write   # upload SARIF p/ code scanning
      id-token: write           # OIDC p/ assinar/publicar o score público
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Scorecard recomenda persist-credentials: false p/ evitar leak.
          persist-credentials: false

      - name: Run Scorecard
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true   # habilita o badge público (scorecard.dev)
          repo_token: ${{ secrets.SCORECARD_READ_TOKEN }}

      - name: Upload SARIF to GitHub code scanning
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4
        with:
          sarif_file: results.sarif
          category: ossf-scorecard

      - name: Upload SARIF artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: scorecard-results
          path: results.sarif
          if-no-files-found: error
          retention-days: 14
