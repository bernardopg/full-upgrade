name: CodeQL

on:
  push:
    branches: [main]
    paths: [".github/workflows/**"]
  pull_request:
    branches: [main]
    paths: [".github/workflows/**"]
  schedule:
    - cron: "27 4 * * 1"   # segunda 04:27 UTC
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      security-events: write
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        # CodeQL não suporta Bash; analisamos os próprios workflows (GitHub Actions).
        # Por isso o gatilho é path-filtered: só roda quando os workflows mudam
        # (+ varredura semanal). NÃO é required check — um PR que não toca em
        # .github/workflows/ não gera este check.
        language: [actions]
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        with:
          languages: ${{ matrix.language }}
          queries: security-extended

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        with:
          category: "/language:${{ matrix.language }}"
