name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag a publicar (ex: v3.0.0)"
        required: true

permissions:
  contents: read

# Caminho workflow_dispatch: o bump de VERSION + fechamento do CHANGELOG entram
# no `main` via PR de ciclo curto, aberto com FU_RELEASE_TOKEN (PAT do owner) e
# não com o GITHUB_TOKEN. Motivo: o GitHub NÃO dispara workflows on:pull_request
# em PRs criados pelo GITHUB_TOKEN (anti-loop) — os required checks ("Lint & Test",
# "Validar Conventional Commits") nunca reportariam e o merge ficaria BLOCKED
# (foi o que travou o release 3.22.0). Com o PAT, o CI roda e o auto-merge
# funciona. O job valida (bash -n) antes de abrir o PR. O caminho de tag-push
# (manual) não toca no `main`.

jobs:
  bump:
    name: Bump VERSION via PR (workflow_dispatch)
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write      # push do branch release/*
      pull-requests: write # abrir e mesclar o PR
    outputs:
      version: ${{ steps.ver.outputs.version }}
      tag: ${{ steps.ver.outputs.tag }}
      sha: ${{ steps.sha.outputs.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Resolver versão
        id: ver
        env:
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          v="${INPUT_TAG}"
          echo "tag=${v}" >> "$GITHUB_OUTPUT"
          echo "version=${v#v}" >> "$GITHUB_OUTPUT"

      - name: Bump de VERSION + fechar CHANGELOG, abrir PR e mesclar
        env:
          VERSION: ${{ steps.ver.outputs.version }}
          TAG: ${{ steps.ver.outputs.tag }}
          # PAT do owner (fine-grained, contents:write + pull-requests:write).
          # Indispensável: só assim o GitHub dispara o CI no PR do bump. O
          # GITHUB_TOKEN cria o PR, mas os workflows on:pull_request são
          # suprimidos (anti-loop) e os required checks nunca reportam.
          GH_TOKEN: ${{ secrets.FU_RELEASE_TOKEN }}
        run: |
          set -euo pipefail
          branch="release/${TAG}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$branch"

          printf '%s\n' "${VERSION}" > VERSION
          # Atualiza só a linha de fallback literal (valor começa com dígito);
          # as linhas que resolvem via git describe / arquivo VERSION usam
          # variáveis ($_git_ver/$_file_ver) e não devem ser sobrescritas.
          sed -i -E "s/SCRIPT_VERSION=\"[0-9][^\"]*\"/SCRIPT_VERSION=\"${VERSION}\"/" full-upgrade.sh
          sed -i -E "s/_build_ver=\"[0-9][^\"]*\"/_build_ver=\"${VERSION}\"/" build.sh
          bash -n full-upgrade.sh build.sh

          # Fecha a seção [Unreleased] do CHANGELOG sob a nova versão (idempotente:
          # não faz nada se a seção está vazia ou o heading da versão já existe).
          python3 - "$VERSION" <<'PYEOF'
          import re, sys, datetime
          version = sys.argv[1]
          path = 'CHANGELOG.md'
          text = open(path).read()
          if f'## [{version}]' in text:
              print(f'CHANGELOG já tem {version}; nada a fazer.')
              sys.exit(0)
          m = re.search(r'^## \[Unreleased\]\s*\n(.*?)(?=^## \[|\Z)', text, re.M | re.S)
          if not m or not m.group(1).strip():
              print('Seção [Unreleased] vazia; CHANGELOG inalterado.')
              sys.exit(0)
          today = datetime.date.today().isoformat()
          heading = f'## [Unreleased]\n\n## [{version}] - {today}\n'
          text = text[:m.start()] + heading + m.group(1).lstrip('\n') + text[m.end():]
          open(path, 'w').write(text)
          print(f'CHANGELOG: [Unreleased] fechado como [{version}] - {today}.')
          PYEOF

          git add VERSION full-upgrade.sh build.sh CHANGELOG.md
          git commit -m "chore(release): bump VERSION para ${VERSION}"
          git push origin "$branch"

          pr_num=$(gh pr create --base main --head "$branch" \
            --title "chore(release): bump VERSION para ${VERSION}" \
            --body "Bump automático de VERSION para ${VERSION} (workflow de release).")
          pr_num=$(gh pr view "$pr_num" --json number -q .number)
          echo "PR #$pr_num aberto; aguardando checks serem registrados..."
          # Os checks levam alguns segundos para aparecer após abrir o PR.
          # `gh pr checks --watch` sai imediatamente se ainda não há checks,
          # então primeiro esperamos pelo menos um check existir.
          for _ in $(seq 1 60); do
            if [ -n "$(gh pr checks "$pr_num" 2>/dev/null || true)" ]; then break; fi
            sleep 5
          done
          # Aguarda todos os checks terminarem (tolera falha em NÃO-obrigatórios;
          # se um obrigatório falhar, o merge a seguir recusa e falha o job).
          gh pr checks "$pr_num" --watch --interval 15 || true

          # Mescla via squash — respeita os required status checks da proteção.
          gh pr merge "$pr_num" --squash --delete-branch \
            --subject "chore(release): bump VERSION para ${VERSION} (#${pr_num})"

      - name: Capturar SHA do commit mesclado em main
        id: sha
        env:
          GH_TOKEN: ${{ secrets.FU_RELEASE_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          sleep 3
          sha=$(gh api "repos/${REPO}/git/refs/heads/main" --jq '.object.sha')
          echo "sha=${sha}" >> "$GITHUB_OUTPUT"

  release:
    name: Build & Publish
    needs: bump
    # Roda após o bump (dispatch) ou diretamente em push de tag (bump é skipped).
    if: always() && (needs.bump.result == 'success' || github.event_name == 'push')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write       # criar release + push da tag
      id-token: write       # para gerar atestações de build
      attestations: write   # para persistir atestações de build
    outputs:
      tag: ${{ steps.tag.outputs.name }}
      version: ${{ steps.tag.outputs.version }}
    steps:
      - name: Checkout
        # dispatch: checkout exato do commit mesclado pelo bump; push: a tag.
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          ref: ${{ (github.event_name == 'workflow_dispatch' && needs.bump.outputs.sha) || github.ref }}

      - name: Install shellcheck + bats
        run: sudo apt-get update && sudo apt-get install -y shellcheck bats

      - name: Validate before release
        run: |
          shopt -s nullglob
          for f in full-upgrade.sh lib/*.sh lib/steps/*.sh steps.d/*.sh install.sh build.sh; do
            bash -n "$f"
          done
          shellcheck -S warning -x \
            full-upgrade.sh lib/*.sh lib/steps/*.sh steps.d/*.sh install.sh build.sh
          bats tests/

      - name: Build standalone
        run: |
          ./build.sh
          sha256sum dist/full-upgrade-standalone.sh > dist/full-upgrade-standalone.sh.sha256
          cat dist/full-upgrade-standalone.sh.sha256

      - name: Attest build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: |
            dist/full-upgrade-standalone.sh
            dist/full-upgrade-standalone.sh.sha256

      - name: Resolve tag
        id: tag
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          if [ "${EVENT_NAME}" = "workflow_dispatch" ]; then
            name="${INPUT_TAG}"
          else
            name="${GITHUB_REF_NAME}"
          fi
          echo "name=${name}" >> "$GITHUB_OUTPUT"
          echo "version=${name#v}" >> "$GITHUB_OUTPUT"

      # No workflow_dispatch a tag ainda não existe (foi criada só no main);
      # cria e empurra. No push de tag a tag já existe (criada por quem disparou).
      - name: Criar e empurrar tag (apenas workflow_dispatch)
        if: github.event_name == 'workflow_dispatch'
        env:
          TAG: ${{ steps.tag.outputs.name }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${TAG}"
          git push origin "${TAG}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: full-upgrade ${{ steps.tag.outputs.name }}
          generate_release_notes: true
          files: |
            dist/full-upgrade-standalone.sh
            dist/full-upgrade-standalone.sh.sha256

  publish-aur:
    name: Publish to AUR
    needs: release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Publica tanto em push de tag v* quanto em workflow_dispatch manual, desde
    # que a tag informada exista no repositório. Requer os secrets AUR_* configurados.
    if: always() && needs.release.result == 'success' && (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && startsWith(inputs.tag, 'v')))
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Validar existência da tag informada
        env:
          TAG: ${{ needs.release.outputs.tag }}
        run: |
          set -euo pipefail
          test -n "${TAG}"
          git fetch --depth=1 origin "refs/tags/${TAG}:refs/tags/${TAG}" || {
            echo "Tag ${TAG} não encontrada no repositório remoto; abortando publicação no AUR."
            exit 1
          }
          echo "Tag ${TAG} validada no repositório."

      - name: Preparar PKGBUILD com a versão da release
        id: pkg
        env:
          VERSION: ${{ needs.release.outputs.version }}
        run: |
          set -euo pipefail
          test -n "${VERSION}"
          workdir="$RUNNER_TEMP/aurpkg"
          mkdir -p "$workdir"
          cp packaging/aur/PKGBUILD "$workdir/PKGBUILD"
          # Fixa pkgver na versão publicada e reseta pkgrel=1.
          sed -i -E "s/^pkgver=.*/pkgver=${VERSION}/" "$workdir/PKGBUILD"
          sed -i -E "s/^pkgrel=.*/pkgrel=1/" "$workdir/PKGBUILD"
          echo "workdir=${workdir}" >> "$GITHUB_OUTPUT"

      - name: Calcular checksum real do tarball da tag
        env:
          VERSION: ${{ needs.release.outputs.version }}
          WORKDIR: ${{ steps.pkg.outputs.workdir }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          workdir="${WORKDIR}"
          url="https://github.com/${REPO}/archive/refs/tags/v${VERSION}.tar.gz"
          # Aguarda o tarball da tag ficar disponível e baixa.
          for i in 1 2 3 4 5; do
            if curl -fsSL -o "$workdir/src.tar.gz" "$url"; then break; fi
            echo "tarball ainda indisponível (tentativa $i); aguardando..."; sleep 10
          done
          sum="$(sha256sum "$workdir/src.tar.gz" | awk '{print $1}')"
          echo "sha256=${sum}"
          # Substitui o placeholder SKIP pelo checksum real.
          sed -i -E "s/^sha256sums=.*/sha256sums=('${sum}')/" "$workdir/PKGBUILD"
          echo "--- PKGBUILD final ---"; cat "$workdir/PKGBUILD"

      - name: Validar PKGBUILD e gerar .SRCINFO
        uses: KSXGitHub/github-actions-deploy-aur@da03e160361ce01bf087e790b6ffd196d7dccff7 # v4.1.3
        with:
          pkgname: full-upgrade
          pkgbuild: ${{ steps.pkg.outputs.workdir }}/PKGBUILD
          commit_username: ${{ secrets.AUR_USERNAME }}
          commit_email: ${{ secrets.AUR_EMAIL }}
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: "Atualiza para v${{ needs.release.outputs.version }}"
          ssh_keyscan_types: rsa,ecdsa,ed25519
          updpkgsums: false
