name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag a publicar (ex: v3.0.0)"
        required: true

permissions:
  contents: read

# A proteção de branch do `main` exige `Lint & Test` + `Analyze (actions)` e
# bloqueia commits diretos do github-actions[bot]. Por isso, no caminho
# workflow_dispatch, o bump de VERSION entra no `main` via PR de ciclo curto
# (auto-merge após os checks obrigatórios) — só assim o bot consegue atualizar
# o `main`. O caminho de tag-push (manual) não toca no `main`.

jobs:
  bump:
    name: Bump VERSION via PR (workflow_dispatch)
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write      # push do branch release/*
      pull-requests: write # abrir e mesclar o PR
    outputs:
      version: ${{ steps.ver.outputs.version }}
      tag: ${{ steps.ver.outputs.tag }}
      sha: ${{ steps.sha.outputs.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Resolver versão
        id: ver
        run: |
          v="${{ inputs.tag }}"
          echo "tag=${v}" >> "$GITHUB_OUTPUT"
          echo "version=${v#v}" >> "$GITHUB_OUTPUT"

      - name: Bump de VERSION + fallbacks, abrir PR e mesclar
        env:
          VERSION: ${{ steps.ver.outputs.version }}
          TAG: ${{ steps.ver.outputs.tag }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          branch="release/${TAG}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$branch"
          printf '%s\n' "${VERSION}" > VERSION
          # Atualiza só a linha de fallback literal (valor começa com dígito);
          # as linhas que resolvem via git describe / arquivo VERSION usam
          # variáveis ($_git_ver/$_file_ver) e não devem ser sobrescritas.
          sed -i -E "s/SCRIPT_VERSION=\"[0-9][^\"]*\"/SCRIPT_VERSION=\"${VERSION}\"/" full-upgrade.sh
          sed -i -E "s/_build_ver=\"[0-9][^\"]*\"/_build_ver=\"${VERSION}\"/" build.sh
          bash -n full-upgrade.sh build.sh
          git add VERSION full-upgrade.sh build.sh
          git commit -m "chore(release): bump VERSION para ${VERSION}"
          git push origin "$branch"

          pr_num=$(gh pr create --base main --head "$branch" \
            --title "chore(release): bump VERSION para ${VERSION}" \
            --body "Bump automático de VERSION para ${VERSION} (workflow de release).")
          pr_num=$(gh pr view "$pr_num" --json number -q .number)
          echo "PR #$pr_num aberto; aguardando checks obrigatórios (Lint & Test + Analyze)..."

          # Espera os checks terminarem (tolera falha em checks NÃO-obrigatórios;
          # se um obrigatório falhar, o merge a seguir recusa e falha o job).
          gh pr checks "$pr_num" --watch --interval 20 || true

          # Mescla via squash — respeita os required status checks da proteção.
          gh pr merge "$pr_num" --squash --delete-branch \
            --subject "chore(release): bump VERSION para ${VERSION} (#${pr_num})"

      - name: Capturar SHA do commit mesclado em main
        id: sha
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          sleep 3
          sha=$(gh api "repos/${{ github.repository }}/git/refs/heads/main" --jq '.object.sha')
          echo "sha=${sha}" >> "$GITHUB_OUTPUT"

  release:
    name: Build & Publish
    needs: bump
    # Roda após o bump (dispatch) ou diretamente em push de tag (bump é skipped).
    if: always() && (needs.bump.result == 'success' || github.event_name == 'push')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write   # criar release + push da tag
    outputs:
      tag: ${{ steps.tag.outputs.name }}
      version: ${{ steps.tag.outputs.version }}
    steps:
      - name: Checkout
        # dispatch: checkout exato do commit mesclado pelo bump; push: a tag.
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          ref: ${{ (github.event_name == 'workflow_dispatch' && needs.bump.outputs.sha) || github.ref }}

      - name: Install shellcheck + bats
        run: sudo apt-get update && sudo apt-get install -y shellcheck bats

      - name: Validate before release
        run: |
          shopt -s nullglob
          for f in full-upgrade.sh lib/*.sh lib/steps/*.sh steps.d/*.sh install.sh build.sh; do
            bash -n "$f"
          done
          shellcheck -S warning -x \
            full-upgrade.sh lib/*.sh lib/steps/*.sh steps.d/*.sh install.sh build.sh
          bats tests/

      - name: Build standalone
        run: |
          ./build.sh
          sha256sum dist/full-upgrade-standalone.sh > dist/full-upgrade-standalone.sh.sha256
          cat dist/full-upgrade-standalone.sh.sha256

      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            name="${{ inputs.tag }}"
          else
            name="${GITHUB_REF_NAME}"
          fi
          echo "name=${name}" >> "$GITHUB_OUTPUT"
          echo "version=${name#v}" >> "$GITHUB_OUTPUT"

      # No workflow_dispatch a tag ainda não existe (foi criada só no main);
      # cria e empurra. No push de tag a tag já existe (criada por quem disparou).
      - name: Criar e empurrar tag (apenas workflow_dispatch)
        if: github.event_name == 'workflow_dispatch'
        env:
          TAG: ${{ steps.tag.outputs.name }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${TAG}"
          git push origin "${TAG}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: full-upgrade ${{ steps.tag.outputs.name }}
          generate_release_notes: true
          files: |
            dist/full-upgrade-standalone.sh
            dist/full-upgrade-standalone.sh.sha256

  publish-aur:
    name: Publish to AUR
    needs: release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Publica tanto em push de tag v* quanto em workflow_dispatch manual, desde
    # que a tag informada exista no repositório. Requer os secrets AUR_* configurados.
    if: always() && needs.release.result == 'success' && (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && startsWith(inputs.tag, 'v')))
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Validar existência da tag informada
        env:
          TAG: ${{ needs.release.outputs.tag }}
        run: |
          set -euo pipefail
          test -n "${TAG}"
          git fetch --depth=1 origin "refs/tags/${TAG}:refs/tags/${TAG}" || {
            echo "Tag ${TAG} não encontrada no repositório remoto; abortando publicação no AUR."
            exit 1
          }
          echo "Tag ${TAG} validada no repositório."

      - name: Preparar PKGBUILD com a versão da release
        id: pkg
        env:
          VERSION: ${{ needs.release.outputs.version }}
        run: |
          set -euo pipefail
          test -n "${VERSION}"
          workdir="$RUNNER_TEMP/aurpkg"
          mkdir -p "$workdir"
          cp packaging/aur/PKGBUILD "$workdir/PKGBUILD"
          # Fixa pkgver na versão publicada e reseta pkgrel=1.
          sed -i -E "s/^pkgver=.*/pkgver=${VERSION}/" "$workdir/PKGBUILD"
          sed -i -E "s/^pkgrel=.*/pkgrel=1/" "$workdir/PKGBUILD"
          echo "workdir=${workdir}" >> "$GITHUB_OUTPUT"

      - name: Calcular checksum real do tarball da tag
        env:
          VERSION: ${{ needs.release.outputs.version }}
        run: |
          set -euo pipefail
          workdir="${{ steps.pkg.outputs.workdir }}"
          url="https://github.com/${{ github.repository }}/archive/refs/tags/v${VERSION}.tar.gz"
          # Aguarda o tarball da tag ficar disponível e baixa.
          for i in 1 2 3 4 5; do
            if curl -fsSL -o "$workdir/src.tar.gz" "$url"; then break; fi
            echo "tarball ainda indisponível (tentativa $i); aguardando..."; sleep 10
          done
          sum="$(sha256sum "$workdir/src.tar.gz" | awk '{print $1}')"
          echo "sha256=${sum}"
          # Substitui o placeholder SKIP pelo checksum real.
          sed -i -E "s/^sha256sums=.*/sha256sums=('${sum}')/" "$workdir/PKGBUILD"
          echo "--- PKGBUILD final ---"; cat "$workdir/PKGBUILD"

      - name: Validar PKGBUILD e gerar .SRCINFO
        uses: KSXGitHub/github-actions-deploy-aur@da03e160361ce01bf087e790b6ffd196d7dccff7 # v4.1.3
        with:
          pkgname: full-upgrade
          pkgbuild: ${{ steps.pkg.outputs.workdir }}/PKGBUILD
          commit_username: ${{ secrets.AUR_USERNAME }}
          commit_email: ${{ secrets.AUR_EMAIL }}
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: "Atualiza para v${{ needs.release.outputs.version }}"
          ssh_keyscan_types: rsa,ecdsa,ed25519
          updpkgsums: false
